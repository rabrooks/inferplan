name: 🚀 Feature request
description: Propose a new scenario, formula, or capability.
title: "[Feature]: "
labels: ["feature request"]

body:
- type: markdown
  attributes:
    value: >
      #### Before filing, please search [existing issues](https://github.com/rabrooks/inferplan/issues?q=is%3Aissue+sort%3Acreated-desc) and skim the [Roadmap](https://github.com/rabrooks/inferplan#roadmap) — the thing you want may already be planned.
- type: textarea
  attributes:
    label: The feature, motivation, and pitch
    description: >
      A clear and concise description of what you'd like, and the problem it
      solves. e.g. *"I'm sizing X and want the tool to also report Y."* If it
      relates to another issue, link it.
  validations:
    required: true
- type: textarea
  attributes:
    label: Alternatives considered
    description: Any workarounds or other approaches you've weighed.
  validations:
    required: false
- type: textarea
  attributes:
    label: Additional context
    description: Screenshots, references, or measured numbers that would inform the design.
  validations:
    required: false
